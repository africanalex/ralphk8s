apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.job.name }}-prompts
data:
  # This compiles the final prompt for the specific AI provider
  system-prompt.md: |
    {{- $base := .Files.Get "prompts/base-prompt.md" -}}
    {{- $providerSpec := .Files.Get (printf "prompts/%s-prompt.md" .Values.job.aiProvider) -}}
    
    {{/* Inject the Runtime into the base prompt text */}}
    {{- $combined := printf "%s\n\n%s" $base $providerSpec -}}
    {{- tpl $combined . | nindent 4 -}}